#mod-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10000; font-family: 'Arial Black', sans-serif; }
#hud { position: absolute; top: 20px; left: 20px; pointer-events: auto; display: flex; flex-direction: column; gap: 15px; }
.btn-mod { background: #ffcc00; border: 4px solid #000; border-radius: 12px; padding: 12px 24px; font-size: 18px; font-weight: 900; color: #000; cursor: pointer; box-shadow: 6px 6px 0px #000; transition: all 0.1s; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
.btn-mod:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0px #000; }
.btn-skip { background: #ff4444; color: #fff; }
#level-counter { background: #000; color: #fff; padding: 5px 15px; border-radius: 20px; font-size: 14px; width: fit-content; border: 2px solid #ffcc00; }
</style>
</head>

function triggerSkip() {
PokiSDK.gameplayStop();
PokiSDK.rewardedBreak().then((success) => {

function startCustomMode() {

function updateEngineLevel() {
document.getElementById('lvl-idx').innerText = currentIdx;
if (currentIdx > 200) {
const lvlData = EXTRA_LEVEL_DATA.find(l => l.id === currentIdx);

} else {
if (window.fancade) window.fancade.gotoLevel(currentIdx);
}
}
