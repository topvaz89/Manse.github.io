<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Drive Mad 3D - Poki 2026</title>
    <!-- Poki SDK & 3D Libraries -->
    <script src="https://game-cdn.poki.com/scripts/v2/poki-sdk.js"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        body { margin: 0; background: #5d9cec; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h1 id="lvl">LEVEL 1: START</h1><p>ARROW KEYS TO DRIVE</p></div>

    <script>
        let world, carBody, vehicle, scene, camera, renderer;
        
        // 1. Initialize Poki SDK
        PokiSDK.init().then(() => {
            PokiSDK.gameLoadingFinished();
            init3D();
            PokiSDK.gameplayStart();
        }).catch(() => init3D());

        function init3D() {
            // Setup Three.js Scene
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Setup Cannon.js Physics
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0); //

            // Create Floor (Green Voxel Style)
            const groundBody = new CANNON.Body({ mass: 0, shape: new CANNON.Plane() });
            groundBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
            world.addBody(groundBody);

            create3DVehicle();
            animate();
        }

        function create3DVehicle() {
            // Chasis (The Red Car Body)
            const chassisShape = new CANNON.Box(new CANNON.Vec3(1, 0.5, 2));
            carBody = new CANNON.Body({ mass: 150 });
            carBody.addShape(chassisShape);
            carBody.position.set(0, 2, 0);
            world.addBody(carBody);

            // Visual Car
            const geometry = new THREE.BoxGeometry(2, 1, 4);
            const material = new THREE.MeshPhongMaterial({ color: 0xff4444 });
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            
            // Link Physics to Visuals
            carBody.visual = mesh;
        }

        function animate() {
            requestAnimationFrame(animate);
            world.step(1/60);
            
            // Sync positions
            carBody.visual.position.copy(carBody.position);
            carBody.visual.quaternion.copy(carBody.quaternion);

            // Camera follow
            camera.position.set(carBody.position.x + 10, carBody.position.y + 5, carBody.position.z);
            camera.lookAt(carBody.position);

            renderer.render(scene, camera);
        }

        // Input Handling for Driving logic
        window.addEventListener('keydown', (e) => {
            if(e.key === "ArrowRight") carBody.applyLocalForce(new CANNON.Vec3(0,0,5000), new CANNON.Vec3(0,0,0));
            if(e.key === "ArrowLeft") carBody.applyLocalForce(new CANNON.Vec3(0,0,-5000), new CANNON.Vec3(0,0,0));
        });
    </script>
</body>
</html>
